<!-- Arete sign-in email — emails a 6-digit code, not a magic link. -->
<div style="font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; max-width: 480px; margin: 0 auto; color: #1C1814;">
  <h2 style="font-family: Georgia, serif; color: #1C1814; margin-bottom: 8px;">Your Arete sign-in code</h2>
  <p style="color: #52310F; line-height: 1.6; margin: 0 0 20px;">
    Enter this 6-digit code to sign in to Arete:
  </p>
  <p style="font-size: 30px; font-weight: bold; letter-spacing: 8px; font-family: 'JetBrains Mono', Menlo, monospace; color: #1C1814; background: #F5EFE0; border: 1px solid #E1C89A; border-radius: 10px; padding: 16px 0; text-align: center; margin: 0 0 20px;">
    {{ .Token }}
  </p>
  <p style="color: #6E4216; font-size: 14px; line-height: 1.6; margin: 0 0 4px;">
    This code expires in 1 hour. If you didn't request it, you can safely ignore this email.
  </p>
  <p style="color: #8E5A1F; font-size: 12px; margin-top: 24px;">
    Arete · Department of Cybersecurity, University of Uyo
  </p>
</div>
